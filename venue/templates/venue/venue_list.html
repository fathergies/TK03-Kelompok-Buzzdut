<!DOCTYPE html>
<html>
<head>
    <title>Daftar Venue</title>
</head>
<body>
    <h1>Daftar Venue</h1>

    <a href="{% url 'venue_create' %}">Tambah Venue</a>

    <table border="1" cellpadding="8">
        <tr>
            <th>Nama Venue</th>
            <th>Alamat</th>
            <th>Kota</th>
            <th>Kapasitas</th>
            <th>Aksi</th>
        </tr>

        {% for venue in venues %}
        <tr>
            <td>{{ venue.nama_venue }}</td>
            <td>{{ venue.alamat }}</td>
            <td>{{ venue.kota }}</td>
            <td>{{ venue.kapasitas }}</td>
            <td>
                <a href="{% url 'venue_update' venue.venue_id %}">Edit</a>
                |
                <a href="{% url 'venue_delete' venue.venue_id %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">Belum ada venue.</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
