<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Venue - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800">
    <nav class="bg-white border-b border-slate-200 px-10 py-5 flex items-center justify-between">
        <div class="flex items-center gap-10">
            <div class="text-3xl font-extrabold text-indigo-500">TikTakTuk</div>

            <div class="flex items-center gap-7 text-lg">
                <a href="#" class="text-slate-700 hover:text-indigo-500">Home</a>
                <a href="#" class="text-slate-700 hover:text-indigo-500">Events</a>
                <a href="{% url 'venue_list' %}" class="text-indigo-500 font-bold">Venue</a>
                <a href="#" class="text-slate-700 hover:text-indigo-500">Orders</a>
                <a href="#" class="text-slate-700 hover:text-indigo-500">Logout</a>
            </div>
        </div>

        <div class="bg-indigo-50 text-indigo-500 px-6 py-3 rounded-full font-bold text-lg">
            Role: {{ role }}
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }
    </script>
</body>
</html>
