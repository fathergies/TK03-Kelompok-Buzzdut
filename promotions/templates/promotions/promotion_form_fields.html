<div>
    <label for="{{ prefix }}code" class="block text-sm font-semibold text-gray-700 mb-2">Kode Promo</label>
    <input id="{{ prefix }}code" name="code" type="text" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>
<div>
    <label for="{{ prefix }}discount_type" class="block text-sm font-semibold text-gray-700 mb-2">Tipe Diskon</label>
    <select id="{{ prefix }}discount_type" name="discount_type" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="Persentase">Persentase</option>
        <option value="Nominal">Nominal</option>
    </select>
</div>
<div>
    <label for="{{ prefix }}discount_value" class="block text-sm font-semibold text-gray-700 mb-2">Nilai Diskon</label>
    <input id="{{ prefix }}discount_value" name="discount_value" type="number" min="0" step="0.01" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>
<div>
    <label for="{{ prefix }}usage_limit" class="block text-sm font-semibold text-gray-700 mb-2">Batas Penggunaan</label>
    <input id="{{ prefix }}usage_limit" name="usage_limit" type="number" min="1" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>
<div>
    <label for="{{ prefix }}start_date" class="block text-sm font-semibold text-gray-700 mb-2">Tanggal Mulai</label>
    <input id="{{ prefix }}start_date" name="start_date" type="date" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>
<div>
    <label for="{{ prefix }}end_date" class="block text-sm font-semibold text-gray-700 mb-2">Tanggal Berakhir</label>
    <input id="{{ prefix }}end_date" name="end_date" type="date" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>
