<div class="promo-field md:col-span-2">
    <label for="{{ prefix }}code" class="promo-label">Kode Promo</label>
    <input id="{{ prefix }}code" name="code" type="text" required placeholder="CTH..  TIKTAK20"
           class="promo-input uppercase">
</div>

<div class="promo-field md:col-span-2">
    <label for="{{ prefix }}discount_type" class="promo-label">Tipe Diskon</label>
    <select id="{{ prefix }}discount_type" name="discount_type" required class="promo-input promo-select">
        <option value="PERCENTAGE">Persentase (%)</option>
        <option value="NOMINAL">Nominal</option>
    </select>
</div>

<div class="promo-field md:col-span-2">
    <label for="{{ prefix }}discount_value" class="promo-label">Nilai Diskon</label>
    <input id="{{ prefix }}discount_value" name="discount_value" type="number" min="0.01" step="0.01" required placeholder="cth. 20"
           class="promo-input">
</div>

<div class="promo-field">
    <label for="{{ prefix }}start_date" class="promo-label">Tanggal Mulai</label>
    <input id="{{ prefix }}start_date" name="start_date" type="date" required class="promo-input">
</div>

<div class="promo-field">
    <label for="{{ prefix }}end_date" class="promo-label">Tanggal Berakhir</label>
    <input id="{{ prefix }}end_date" name="end_date" type="date" required class="promo-input">
</div>

<div class="promo-field md:col-span-2">
    <label for="{{ prefix }}usage_limit" class="promo-label">Batas Penggunaan</label>
    <input id="{{ prefix }}usage_limit" name="usage_limit" type="number" min="1" step="1" required value="{% if not prefix %}1{% endif %}"
           class="promo-input">
</div>
