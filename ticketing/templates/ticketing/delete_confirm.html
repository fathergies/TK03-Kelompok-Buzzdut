{% extends "ticketing/base.html" %}

{% block title %}Delete {{ object_type }} — Ticketing System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">⚠️ Confirm Deletion</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Are you sure you want to delete this {{ object_type|lower }}?</p>
                <p class="fw-bold fs-4">{{ object }}</p>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url cancel_url %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
